<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moja mapa podróży</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin: 0; font-family: Arial; }
    header {
      background: #111;
      color: white;
      padding: 10px;
      text-align: center;
    }
    #map { height: calc(100vh - 50px); }
    .hint {
      position: absolute;
      top: 60px;
      left: 10px;
      background: white;
      padding: 8px;
      border-radius: 8px;
      z-index: 999;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>🌍 Kliknij na mapę aby dodać miejsce</header>
<div class="hint">Kliknij w dowolne miejsce na mapie</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([52, 19], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 🔄 wczytaj zapisane miejsca
  let places = JSON.parse(localStorage.getItem("places") || "[]");

  function savePlaces() {
    localStorage.setItem("places", JSON.stringify(places));
  }

  function addMarker(place) {
    L.marker(place.coords)
      .addTo(map)
      .bindPopup(`<b>${place.name}</b>`);
  }

  // pokaż zapisane miejsca
  places.forEach(addMarker);

  // kliknięcie na mapę
  map.on('click', function(e) {
    const name = prompt("Nazwij to miejsce:");
    if (!name) return;

    const place = {
      name: name,
      coords: [e.latlng.lat, e.latlng.lng]
    };

    places.push(place);
    savePlaces();
    addMarker(place);
  });
</script>

</body>
</html>
